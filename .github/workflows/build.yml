---
name: Build Bazzite images
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
  workflow_dispatch:

jobs:
  build_push:
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: bazzite-dx-gnome
            image_name: bazzite-dx-gnome-mt7927
            variant: default
            image_desc: "Bazzite DX GNOME with MediaTek MT7927 WiFi 7 / Bluetooth patches"
          - base_image: bazzite-dx-gnome
            image_name: bazzite-dx-niri-mt7927
            variant: niri
            image_desc: "Bazzite DX (GNOME stripped) + niri + Dank Material Shell with MediaTek MT7927 WiFi 7 / Bluetooth patches"
    uses: ./.github/workflows/build-image.yml
    with:
      base_image: ${{ matrix.base_image }}
      image_name: ${{ matrix.image_name }}
      variant: ${{ matrix.variant }}
      tag: stable
      image_desc: ${{ matrix.image_desc }}
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write
