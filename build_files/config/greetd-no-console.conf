# Route greetd's (and its PAM children's) stderr to the journal only, not to
# /dev/console. pam_systemd emits harmless 'Failed to check if /run/user/0/bus
# exists, ignoring: Permission denied' warnings during greeter setup that were
# flashing on VT1 between plymouth quit and dms-greeter rendering.
[Service]
StandardError=journal
